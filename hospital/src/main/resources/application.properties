# =============================================
#   Application Config
# =============================================
spring.application.name=hospital-management

# =============================================
#   MySQL Database
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=abcd@1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
#   JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
#   Server Port
# =============================================
server.port=8080