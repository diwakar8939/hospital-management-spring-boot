# =============================================
#   Application Config
# =============================================
spring.application.name=hospital-management

# =============================================
#   MySQL Database
#   Make sure MySQL is running on your machine.
#   Create the database first:
#     CREATE DATABASE hospital_db;
#
#   Then update the username and password below
#   to match your MySQL setup.
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================
#   JPA / Hibernate
#   update = creates tables if they don't exist,
#            and updates columns if you add new fields.
#   show-sql = prints every SQL query in the console (helpful for learning)
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =============================================
#   Server Port
# =============================================
server.port=8080
